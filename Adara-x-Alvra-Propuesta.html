<!doctype html>
<html lang="es"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Adara × Alvra.IA — Propuesta</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg1:#F5E6D4;--bg2:#ECD6BD;--tan:#D4B59A;--beige:#E4C7A8;
  --terra:#B85B42;--gold:#B8894F;--ink:#2E1F18;
  --ink60:rgba(46,31,24,.62);--ink40:rgba(46,31,24,.42);--ink20:rgba(46,31,24,.2);--ink10:rgba(46,31,24,.1);
  --cream:rgba(255,247,236,.55);--cream-strong:rgba(255,247,236,.75);
  --ease:cubic-bezier(.22,.8,.24,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden}
body{
  font-family:'Inter',system-ui,sans-serif;color:var(--ink);
  background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 100%);
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 .18 0 0 0 0 .12 0 0 0 0 .09 0 0 0 .35 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  opacity:.08;mix-blend-mode:multiply;
}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(2px);opacity:.7}
.orb.tan{background:radial-gradient(closest-side,#D4B59A .5,rgba(212,181,154,0))}
.orb.beige{background:radial-gradient(closest-side,#E4C7A8,rgba(228,199,168,0))}

h1,h2,h3,.serif{font-family:'DM Serif Display',serif;font-style:italic;font-weight:400;letter-spacing:-.01em}
h1{font-size:clamp(48px,7.8vw,124px);line-height:.95}
h2{font-size:clamp(36px,5.2vw,72px);line-height:1.02}
h3{font-size:clamp(22px,2.2vw,30px);line-height:1.15}
.mono,.label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase}

/* Top bar */
.bar{position:fixed;top:0;left:0;right:0;z-index:50;height:2px;background:rgba(46,31,24,.08)}
.bar>i{display:block;height:100%;width:10%;background:linear-gradient(90deg,var(--terra),var(--gold));transition:width .8s var(--ease)}

.brand{position:fixed;top:24px;left:32px;z-index:40;display:flex;align-items:center;gap:12px}
.brand .lg{width:30px;height:30px;border:1px solid var(--terra);border-radius:50%;display:grid;place-items:center;color:var(--terra);transform:rotate(45deg)}
.brand .lg div{width:8px;height:8px;background:var(--terra);transform:rotate(45deg)}
.brand .nm{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink)}
.brand .sub{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.22em;color:var(--ink40);margin-top:2px}

.frame{position:fixed;top:30px;right:32px;z-index:40;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;color:var(--ink40)}
.frame b{color:var(--terra);font-weight:500}

/* Vertical dots on right */
.dots{position:fixed;right:32px;top:50%;transform:translateY(-50%);z-index:40;display:flex;flex-direction:column;gap:14px;padding:8px}
.dots button{position:relative;width:6px;height:6px;border-radius:50%;background:var(--ink20);border:0;padding:0;cursor:pointer;transition:all .35s var(--ease)}
.dots button.on{background:var(--terra);width:6px;height:22px;border-radius:6px}
.dots button .tag{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);background:var(--cream-strong);backdrop-filter:blur(8px);padding:5px 9px;border:1px solid var(--ink10);border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .25s var(--ease)}
.dots button:hover .tag{opacity:1}

/* Bottom-left nav arrows */
.nav{position:fixed;bottom:32px;left:32px;z-index:40;display:flex;flex-direction:column;gap:8px}
.nav button{width:38px;height:38px;border-radius:50%;border:1px solid var(--ink20);background:var(--cream);backdrop-filter:blur(14px);display:grid;place-items:center;cursor:pointer;color:var(--ink);transition:all .25s var(--ease)}
.nav button:hover:not(:disabled){border-color:var(--terra);color:var(--terra);transform:scale(1.06)}
.nav button:active{transform:scale(.94)}
.nav button:disabled{opacity:.3;cursor:default}
.nav button svg{width:14px;height:14px}

/* Page footer label */
.foot{position:fixed;bottom:32px;right:32px;z-index:40;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink40)}

/* Stage with vertical scroll-snap */
.stage{position:relative;width:100vw;height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;scroll-behavior:smooth;scrollbar-width:none}
.stage::-webkit-scrollbar{display:none}
.slide{position:relative;width:100vw;height:100vh;scroll-snap-align:start;scroll-snap-stop:always;display:flex;align-items:center;justify-content:center;padding:96px 96px 96px;overflow:hidden}
@media(max-width:1100px){.slide{padding:96px 56px}}
.inner{width:100%;max-width:1240px;position:relative;z-index:2}

/* Hairline + section labels */
.hairline{height:1px;background:var(--ink20);width:60px}
.hairline.full{width:100%;background:linear-gradient(90deg,transparent,var(--ink20),transparent)}
.section-label{display:flex;align-items:center;gap:14px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--terra)}
.section-label .num{color:var(--ink40)}

/* Asymmetric two-column */
.two{display:grid;grid-template-columns:1.05fr 1fr;gap:64px;align-items:center}
.two.rev{grid-template-columns:1fr 1.05fr}
@media(max-width:1100px){.two,.two.rev{grid-template-columns:1fr;gap:32px}}

.three{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
@media(max-width:900px){.three{grid-template-columns:1fr}}

.six{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:900px){.six{grid-template-columns:repeat(2,1fr)}}

/* Cream glass cards */
.card{position:relative;background:var(--cream);backdrop-filter:blur(14px) saturate(120%);-webkit-backdrop-filter:blur(14px) saturate(120%);border:1px solid rgba(255,255,255,.5);border-radius:14px;padding:24px;box-shadow:0 1px 0 rgba(255,255,255,.6) inset,0 20px 40px -28px rgba(46,31,24,.25)}
.card.strong{background:var(--cream-strong)}
.card.acc{padding-left:28px}
.card.acc::before{content:'';position:absolute;left:0;top:18px;bottom:18px;width:3px;border-radius:3px;background:var(--terra)}
.card.acc.gold::before{background:var(--gold)}
.card.acc.brown::before{background:var(--ink)}

/* Diamond bullet */
.diamond{display:inline-block;width:6px;height:6px;background:var(--terra);transform:rotate(45deg);margin-right:10px;vertical-align:middle;flex-shrink:0;margin-top:8px}
.diamond.gold{background:var(--gold)}
.diamond.brown{background:var(--ink)}

/* Star bullet (used in frames 2 & 6) */
.dash{display:inline-block;width:10px;height:10px;margin-right:0;flex-shrink:0;margin-top:6px;background-color:var(--terra);-webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2l2.6 7.4L22 12l-7.4 2.6L12 22l-2.6-7.4L2 12l7.4-2.6z'/></svg>") center/contain no-repeat;mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2l2.6 7.4L22 12l-7.4 2.6L12 22l-2.6-7.4L2 12l7.4-2.6z'/></svg>") center/contain no-repeat}
.dash.gold{background-color:var(--gold)}
.dash.brown{background-color:var(--ink)}

/* Lists */
.list{list-style:none;padding-left:0}
.list li{display:flex;gap:10px;align-items:flex-start;padding:6px 0;color:var(--ink);font-size:14.5px;line-height:1.55}
.list li>span:last-child{flex:1}

/* Body text */
p{line-height:1.6;color:var(--ink)}
.lead{font-size:17px;line-height:1.6;color:var(--ink60);max-width:520px}

/* Pill chip */
.chip{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border:1px solid var(--ink20);border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink);background:var(--cream)}
.chip.terra{border-color:var(--terra);color:var(--terra)}
.chip.gold{border-color:var(--gold);color:var(--gold)}

/* Accent italic phrase */
.italic{font-family:'DM Serif Display',serif;font-style:italic;color:var(--terra)}

/* Big number watermark */
.watermark{font-family:'DM Serif Display',serif;font-style:italic;font-size:120px;color:rgba(184,91,66,.08);line-height:.8;position:absolute;right:24px;top:18px;pointer-events:none}

/* Animations: fadein with stagger */
.fadein{opacity:0;transform:translateY(28px);filter:blur(8px);transition:opacity .85s var(--ease),transform .9s var(--ease),filter .8s var(--ease)}
.slide.in .fadein{opacity:1;transform:none;filter:blur(0)}
.slide.in .d1{transition-delay:.06s}.slide.in .d2{transition-delay:.14s}.slide.in .d3{transition-delay:.22s}.slide.in .d4{transition-delay:.3s}.slide.in .d5{transition-delay:.38s}.slide.in .d6{transition-delay:.46s}.slide.in .d7{transition-delay:.54s}.slide.in .d8{transition-delay:.62s}.slide.in .d9{transition-delay:.7s}

/* Animated growing line */
.growline{height:1px;background:var(--ink);transform:scaleX(0);transform-origin:0 50%;transition:transform 1.1s var(--ease) .35s;display:block}
.slide.in .growline{transform:scaleX(1)}
.growline.terra{background:var(--terra)}

/* Phone mock */
.phone{margin:18px auto 0;max-width:280px;background:var(--cream-strong);border-radius:16px;padding:14px;border:1px solid var(--ink10)}
.phone .head{height:34px;border-radius:8px;background:rgba(46,31,24,.05);display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink60);margin-bottom:10px;letter-spacing:.1em}
.phone .lk{padding:11px 12px;border-radius:8px;background:rgba(255,255,255,.5);border:1px solid var(--ink10);margin-bottom:7px;font-size:12.5px;display:flex;justify-content:space-between;align-items:center;color:var(--ink)}
.phone .lk svg{width:11px;height:11px;color:var(--terra)}

/* Roadmap dots */
.tdot{width:11px;height:11px;background:var(--terra);transform:rotate(45deg);margin-bottom:18px}
.tdot.gold{background:var(--gold)}.tdot.brown{background:var(--ink)}

/* Cover specific */
.cover-eyebrow{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:36px}
.cover-meta{position:absolute;bottom:0;right:0;text-align:right;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink60);line-height:1.8}

/* Contact grid */
.contact{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:48px}
@media(max-width:760px){.contact{grid-template-columns:repeat(2,1fr)}}
.contact a{display:block;padding:18px 16px 16px;border-radius:12px;background:var(--cream);border:1px solid var(--ink10);transition:all .3s var(--ease);position:relative}
.contact a:hover{transform:translateY(-3px);border-color:var(--terra)}
.contact .lab{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink40);margin-bottom:6px}
.contact .val{font-family:'DM Serif Display',serif;font-style:italic;font-size:18px;color:var(--ink)}
.contact .ic{position:absolute;top:14px;right:14px;color:var(--terra);opacity:.6}
.contact .ic svg{width:13px;height:13px}

a{color:inherit;text-decoration:none}
.muted{color:var(--ink60)}
.terra{color:var(--terra)}
.gold-c{color:var(--gold)}

/* Day grid mini-calendar */
.cal{display:flex;gap:7px;margin-top:14px}
.cal>div{flex:1;text-align:center}
.cal .d{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink40);letter-spacing:.15em;margin-bottom:6px}
.cal .b{height:42px;border-radius:6px;background:rgba(46,31,24,.06);border:1px solid var(--ink10)}
.cal .b.on{background:rgba(184,91,66,.18);border-color:rgba(184,91,66,.4)}

.cap-flex{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:24px}
</style></head>

const stage=document.getElementById('stage');
const dots=document.getElementById('dots');

SLIDES.forEach((s,i)=>{
  const sec=document.createElement('section');
  sec.className='slide';sec.id='s'+i;sec.innerHTML=s.html;
  stage.appendChild(sec);
  const b=document.createElement('button');
  b.innerHTML=`<span class="tag">${String(i+1).padStart(2,'0')} · ${s.label}</span>`;
  b.onclick=()=>goTo(i);
  dots.appendChild(b);
});
document.getElementById('ftot').textContent=String(SLIDES.length).padStart(2,'0');

let cur=0,scrollLock=false;
const slides=document.querySelectorAll('.slide');

function setActive(n){
  if(n===cur)return;
  cur=n;
  slides.forEach((el,i)=>el.classList.toggle('in',i===n));
  [...dots.children].forEach((b,i)=>b.classList.toggle('on',i===n));
  document.getElementById('prog').style.width=((n+1)/SLIDES.length*100)+'%';
  document.getElementById('fnum').textContent=String(n+1).padStart(2,'0');
  document.getElementById('prev').disabled=n===0;
  document.getElementById('next').disabled=n===SLIDES.length-1;
}

function goTo(i){
  i=Math.max(0,Math.min(SLIDES.length-1,i));
  scrollLock=true;
  slides[i].scrollIntoView({behavior:'smooth',block:'start'});
  setActive(i);
  setTimeout(()=>scrollLock=false,800);
}

function go(d){goTo(cur+d)}
window.go=go;

document.getElementById('prev').onclick=()=>go(-1);
document.getElementById('next').onclick=()=>go(1);

// Detect active slide on scroll
const io=new IntersectionObserver((entries)=>{
  if(scrollLock)return;
  entries.forEach(en=>{
    if(en.isIntersecting&&en.intersectionRatio>0.6){
      const idx=parseInt(en.target.id.slice(1));
      setActive(idx);
    }
  });
},{threshold:[0.6]});
slides.forEach(s=>io.observe(s));

addEventListener('keydown',e=>{
  if(['ArrowDown','ArrowRight','PageDown',' '].includes(e.key)){e.preventDefault();go(1)}
  else if(['ArrowUp','ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();go(-1)}
  else if(e.key==='Home')goTo(0);
  else if(e.key==='End')goTo(SLIDES.length-1);
});

// Init first
slides[0].classList.add('in');
[...dots.children][0].classList.add('on');
document.getElementById('prev').disabled=true;
</script>
</body></html>
